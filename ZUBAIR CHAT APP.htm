<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZUBAIR CHAT APP</title>
    <link rel="stylesheet" href="ZUBAIR%20CHAT%20APP_files/styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div>
                <div class="app-title">ZUBAIR CHAT APP</div>
                <div class="app-subtitle">Real-time chat UI — type, send, and scroll naturally.</div>
            </div>
        </header>

        <div class="chat-window">
            <div class="chat-topbar">
                <div class="tab-group">
                    <div class="tab-label">Switch persona:</div>
                    <div class="persona-tabs">
                        <button type="button" class="persona-tab" data-persona="person1">Person 1</button>
                        <button type="button" class="persona-tab active" data-persona="person2">Person 2</button>
                    </div>
                </div>
                <div class="chat-meta"><span id="activePersonaLabel">Active: Person 2</span></div>
            </div>

            <div class="chat-messages" id="messages"><div class="message received">undefined: HII</div><div class="message received">undefined: Sara: HII</div><div class="message received">person1: HII</div><div class="message sent">person2: HELLO</div></div>

            <form class="chat-input" id="chatForm">
                <button type="button" class="emoji-btn">😊</button>
                <input type="text" id="input" placeholder="Write a message..." autocomplete="off">
                <button type="submit" class="send-btn">Send</button>
            </form>
        </div>
    </div>

    <script src="ZUBAIR%20CHAT%20APP_files/script.js"></script>
<!-- Code injected by live-server -->
<script>
	// <![CDATA[  <-- For SVG support
	if ('WebSocket' in window) {
		(function () {
			function refreshCSS() {
				var sheets = [].slice.call(document.getElementsByTagName("link"));
				var head = document.getElementsByTagName("head")[0];
				for (var i = 0; i < sheets.length; ++i) {
					var elem = sheets[i];
					var parent = elem.parentElement || head;
					parent.removeChild(elem);
					var rel = elem.rel;
					if (elem.href && typeof rel != "string" || rel.length == 0 || rel.toLowerCase() == "stylesheet") {
						var url = elem.href.replace(/(&|\?)_cacheOverride=\d+/, '');
						elem.href = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cacheOverride=' + (new Date().valueOf());
					}
					parent.appendChild(elem);
				}
			}
			var protocol = window.location.protocol === 'http:' ? 'ws://' : 'wss://';
			var address = protocol + window.location.host + window.location.pathname + '/ws';
			var socket = new WebSocket(address);
			socket.onmessage = function (msg) {
				if (msg.data == 'reload') window.location.reload();
				else if (msg.data == 'refreshcss') refreshCSS();
			};
			if (sessionStorage && !sessionStorage.getItem('IsThisFirstTime_Log_From_LiveServer')) {
				console.log('Live reload enabled.');
				sessionStorage.setItem('IsThisFirstTime_Log_From_LiveServer', true);
			}
		})();
	}
	else {
		console.error('Upgrade your browser. This Browser is NOT supported WebSocket for Live-Reloading.');
	}
	// ]]>
</script>


</body></html>
